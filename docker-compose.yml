services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    volumes:
      - ./processor:/processor
    environment:
      DATABASE_URL: postgres://mosaic:mosaic@postgres:5432/mosaic?sslmode=disable
      PROCESSOR_URL: http://processor:8000
      FRONTEND_URL: http://localhost:5173
      EXAMPLES_FILE: /processor/app/examples.txt
      CATEGORIES_FILE: /processor/app/categories.txt
      ACCOUNTS_FILE: /processor/app/accounts.txt
    depends_on:
      postgres:
        condition: service_healthy
      processor:
        condition: service_started

  processor:
    build: ./processor
    ports:
      - "8000:8000"
    volumes:
      - ./processor:/app
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3.2
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://api:8080
    command: /usr/local/bin/node node_modules/vite/bin/vite.js --host 0.0.0.0
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
      POSTGRES_DB: mosaic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

volumes:
  postgres-data:
  ollama-models:
